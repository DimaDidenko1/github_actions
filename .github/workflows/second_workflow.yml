name: Second Workflow
on:
  push:
jobs:
    run-first-command:
      runs-on: ubuntu-latest
      steps:
        - name: Display Node Version
          run: echo "Node versionon Ubuntu"
        - name: Second command
          run: |
            node -v
            npm -v
    run-second-command:
      runs-on: windows-latest
      steps:
        - name: Display node version
          run: echo "Node version on Windows"
        - name: Second command
          run: |
            node -v
            npm -v
    run-third-command:
      runs-on: macos-latest
      needs: run-first-command
      steps:
        - name: Display node version
          run: echo "Node version on macOS"
        - name: Second command
          run: |
            node -v
            npm -v
          